name: ClassicMusicPuzzle
options:
  bundleIdPrefix: com.jamesyyy
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 7
targets:
  ClassicMusicPuzzle:
    type: application
    platform: iOS
    sources:
      - ClassicMusicPuzzleApp/ClassicMusicPuzzle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jamesyyy.classicmusicjourney
        INFOPLIST_FILE: ClassicMusicPuzzleApp/ClassicMusicPuzzle/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: 47DCQ2U48C
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: 5.10
    info:
      path: ClassicMusicPuzzleApp/ClassicMusicPuzzle/Resources/Info.plist
      properties:
        CFBundleDisplayName: Classic Music Journey
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
