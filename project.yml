name: ClassicMusicPuzzle
options:
  bundleIdPrefix: com.jamesyyy
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  ClassicMusicPuzzle:
    type: application
    platform: iOS
    sources:
      - ClassicMusicPuzzleApp/ClassicMusicPuzzle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jamesyyy.classicmusicpuzzle
        INFOPLIST_FILE: ClassicMusicPuzzleApp/ClassicMusicPuzzle/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: 5.10
    info:
      path: ClassicMusicPuzzleApp/ClassicMusicPuzzle/Resources/Info.plist
      properties:
        CFBundleDisplayName: Classic Music Rhythm
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
